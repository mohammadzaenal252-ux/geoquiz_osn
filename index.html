<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi CBT Geografi - 100 Soal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .question-nav-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .nav-answered { background-color: #3b82f6; color: white; }
        .nav-current { border: 2px solid #1e40af; background-color: #dbeafe; }
        .nav-unanswered { background-color: #f3f4f6; color: #374151; }
        
        body { background-color: #f9fafb; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="bg-blue-800 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Simulasi OSN Geografi 2025</h1>
            <div id="timer" class="bg-blue-900 px-4 py-2 rounded-lg font-mono text-lg">02:00:00</div>
        </div>
    </header>

    <main class="container mx-auto p-4 flex flex-col lg:flex-row gap-6">
        
        <!-- Panel Kiri: Soal -->
        <div class="lg:w-3/4">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <span id="question-number" class="text-blue-800 font-bold text-lg">Soal No. 1</span>
                    <span class="text-gray-500 text-sm italic">Pilih satu jawaban terbaik</span>
                </div>
                
                <p id="question-text" class="text-gray-800 text-lg mb-6 leading-relaxed">
                    Sedang memuat soal...
                </p>

                <div id="options-container" class="space-y-3">
                    <!-- Opsi Jawaban -->
                </div>

                <div class="flex justify-between mt-8 pt-6 border-t border-gray-100">
                    <button onclick="prevQuestion()" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">Sebelumnya</button>
                    <button onclick="nextQuestion()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Selanjutnya</button>
                </div>
            </div>
        </div>

        <!-- Panel Kanan: Navigasi & Status -->
        <div class="lg:w-1/4">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 sticky top-24">
                <h3 class="font-bold mb-4 text-gray-700">Navigasi Soal</h3>
                <div id="nav-grid" class="grid grid-cols-5 gap-2 max-h-[400px] overflow-y-auto pr-2">
                    <!-- Grid Nomor Soal -->
                </div>

                <div class="mt-6 pt-6 border-t border-gray-100">
                    <div class="flex gap-4 mb-4 text-sm">
                        <div class="flex items-center gap-2"><span class="w-3 h-3 bg-blue-600 rounded-full"></span> Dijawab</div>
                        <div class="flex items-center gap-2"><span class="w-3 h-3 bg-gray-200 rounded-full"></span> Belum</div>
                    </div>
                    <button onclick="finishExam()" class="w-full py-3 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700 transition shadow-lg">Selesai Ujian</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Hasil -->
    <div id="result-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full text-center">
            <h2 class="text-2xl font-bold mb-2">Ujian Selesai!</h2>
            <p class="text-gray-600 mb-6">Berikut adalah ringkasan hasil Anda:</p>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-green-50 p-4 rounded-lg">
                    <div class="text-sm text-green-700">Benar</div>
                    <div id="res-correct" class="text-2xl font-bold">0</div>
                </div>
                <div class="bg-red-50 p-4 rounded-lg">
                    <div class="text-sm text-red-700">Salah</div>
                    <div id="res-wrong" class="text-2xl font-bold">0</div>
                </div>
            </div>
            <div class="text-4xl font-extrabold text-blue-800 mb-2" id="res-score">Skor: 0</div>
            <p class="text-sm text-gray-400 mb-6">*Sistem penilaian OSN: Benar +4, Salah -1</p>
            <button onclick="location.reload()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">Ulangi Simulasi</button>
        </div>
    </div>

            { q: "Jika suatu grafik menunjukkan penurunan luas hutan tiap tahun, maka kebijakan yang tepat adalah …", a: "Eksploitasi hutan", b: "Reboisasi dan konservasi", c: "Urbanisasi", d: "Industrialisasi", e: "Ekspor kayu", correct: "b" },
            { q: "Migrasi dari desa ke kota biasanya didorong oleh faktor …", a: "Push factor saja", b: "Pull factor saja", c: "Kombinasi push dan pull factor", d: "Faktor budaya", e: "Faktor geografis", correct: "c" },
            { q: "Jika tingkat pengangguran tinggi di kota, maka dampak sosial yang mungkin terjadi adalah …", a: "Stabilitas sosial meningkat", b: "Kriminalitas menurun", c: "Munculnya masalah sosial", d: "Urbanisasi menurun", e: "Pendidikan meningkat", correct: "c" },
            { q: "Globalisasi memengaruhi budaya lokal dengan cara …", a: "Menghilangkan semua budaya lokal", b: "Memperkuat budaya tradisional", c: "Terjadi akulturasi budaya", d: "Menutup interaksi budaya", e: "Membatasi komunikasi", correct: "c" },
            { q: "Jika suatu negara mengalami bonus demografi, maka peluang yang bisa dimanfaatkan adalah …", a: "Beban ekonomi meningkat", b: "Tenaga kerja produktif meningkat", c: "Pengangguran meningkat", d: "Urbanisasi menurun", e: "Pendapatan menurun", correct: "b" },
            { q: "Ketimpangan pembangunan antar wilayah dapat diatasi dengan …", a: "Sentralisasi pembangunan", b: "Pemerataan pembangunan", c: "Industrialisasi kota saja", d: "Urbanisasi besar-besaran", e: "Ekspor sumber daya", correct: "b" },
            { q: "Jika grafik menunjukkan peningkatan GDP tetapi ketimpangan tinggi, maka dapat disimpulkan …", a: "Semua masyarakat sejahtera", b: "Pembangunan merata", c: "Pertumbuhan tidak inklusif", d: "Ekonomi stagnan", e: "Tidak ada masalah", correct: "c" },
            { q: "Perdagangan internasional memberikan manfaat berupa …", a: "Isolasi ekonomi", b: "Penurunan produksi", c: "Akses pasar global", d: "Pengangguran meningkat", e: "Ketergantungan penuh", correct: "c" },
            { q: "Jika nilai tukar mata uang melemah, maka dampaknya adalah …", a: "Impor lebih murah", b: "Ekspor menurun", c: "Ekspor lebih kompetitif", d: "Harga barang turun", e: "Inflasi menurun", correct: "c" },
            { q: "Salah satu dampak negatif globalisasi ekonomi adalah …", a: "Transfer teknologi", b: "Peningkatan investasi", c: "Ketergantungan ekonomi", d: "Akses pasar luas", e: "Pertumbuhan ekonomi", correct: "c" },
            { q: "Jika suatu negara meningkatkan kualitas SDM, maka dampak jangka panjangnya adalah …", a: "Pengangguran meningkat", b: "Produktivitas menurun", c: "Daya saing meningkat", d: "Investasi menurun", e: "Ekonomi stagnan", correct: "c" },
            { q: "Transportasi modern berpengaruh terhadap perubahan sosial berupa …", a: "Isolasi wilayah", b: "Mobilitas meningkat", c: "Interaksi menurun", d: "Tradisi menguat", e: "Teknologi menurun", correct: "b" },
            { q: "Perubahan sosial yang berlangsung cepat disebut …", a: "Evolusi", b: "Revolusi", c: "Adaptasi", d: "Integrasi", e: "Asimilasi", correct: "b" },
            { q: "Faktor pendorong perubahan sosial adalah …", a: "Tradisi kuat", b: "Sikap tertutup", c: "Kontak dengan budaya lain", d: "Isolasi wilayah", e: "Rendahnya pendidikan", correct: "c" },
            { q: "Modernisasi ditandai dengan …", a: "Pola pikir tradisional", b: "Teknologi sederhana", c: "Rasional dan efisien", d: "Ketergantungan alam", e: "Budaya statis", correct: "c" },
            { q: "Jika suatu masyarakat menolak perubahan, maka dampaknya adalah …", a: "Kemajuan cepat", b: "Stagnasi sosial", c: "Modernisasi", d: "Globalisasi", e: "Industrialisasi", correct: "b" },
            { q: "Interaksi sosial yang menghasilkan budaya baru disebut …", a: "Konflik", b: "Asimilasi", c: "Disintegrasi", d: "Diferensiasi", e: "Stratifikasi", correct: "b" },
            { q: "Salah satu dampak negatif modernisasi adalah …", a: "Efisiensi meningkat", b: "Individualisme", c: "Teknologi maju", d: "Produktivitas tinggi", e: "Pendidikan meningkat", correct: "b" },
            { q: "Perubahan struktur ekonomi dari agraris ke industri disebut …", a: "Urbanisasi", b: "Industrialisasi", c: "Globalisasi", d: "Modernisasi", e: "Revolusi", correct: "b" },
            { q: "Jika grafik menunjukkan penurunan tenaga kerja sektor pertanian, maka terjadi …", a: "Agrarisasi", b: "Industrialisasi", c: "Urbanisasi", d: "Globalisasi", e: "Revolusi", correct: "b" },
            { q: "Salah satu indikator negara maju adalah …", a: "Tingkat kelahiran tinggi", b: "Pendapatan per kapita tinggi", c: "Ketergantungan tinggi", d: "Pengangguran tinggi", e: "Pendidikan rendah", correct: "b" },
            { q: "Jika suatu negara memiliki HDI tinggi, maka menunjukkan …", a: "Kualitas hidup rendah", b: "Kesejahteraan tinggi", c: "Ketimpangan tinggi", d: "Ekonomi lemah", e: "Pendidikan rendah", correct: "b" },
            { q: "Salah satu faktor yang memengaruhi pertumbuhan ekonomi adalah …", a: "Jumlah penduduk saja", b: "Teknologi dan investasi", c: "Cuaca", d: "Budaya", e: "Tradisi", correct: "b" },
            { q: "Jika inflasi tinggi, maka daya beli masyarakat akan …", a: "Meningkat", b: "Stabil", c: "Menurun", d: "Tidak berubah", e: "Fluktuatif", correct: "c" },
            { q: "Kegiatan distribusi bertujuan untuk …", a: "Menghasilkan barang", b: "Menyalurkan barang", c: "Mengonsumsi barang", d: "Menyimpan barang", e: "Mengolah barang", correct: "b" },
            { q: "Jika suatu negara mengalami defisit perdagangan, berarti …", a: "Ekspor > impor", b: "Impor > ekspor", c: "Ekspor = impor", d: "Tidak ada perdagangan", e: "Semua benar", correct: "b" },
            { q: "Salah satu peran pemerintah dalam ekonomi adalah …", a: "Konsumen saja", b: "Produsen saja", c: "Regulator", d: "Distributor", e: "Investor asing", correct: "c" },
            { q: "Jika pajak dinaikkan, maka dampaknya adalah …", a: "Konsumsi meningkat", b: "Pendapatan negara meningkat", c: "Inflasi turun drastis", d: "Produksi meningkat", e: "Ekspor meningkat", correct: "b" },
            { q: "Kegiatan konsumsi dipengaruhi oleh …", a: "Selera dan pendapatan", b: "Produksi", c: "Distribusi", d: "Teknologi", e: "Iklim", correct: "a" },
            { q: "Jika suatu negara memiliki cadangan devisa tinggi, maka …", a: "Ekonomi lemah", b: "Stabilitas ekonomi kuat", c: "Ketergantungan tinggi", d: "Inflasi tinggi", e: "Pengangguran tinggi", correct: "b" },
            { q: "Salah satu dampak negatif konsumsi berlebihan adalah …", a: "Hemat energi", b: "Lingkungan rusak", c: "Kesejahteraan meningkat", d: "Produksi efisien", e: "Distribusi lancar", correct: "b" },
            { q: "Jika sumber daya alam terbatas, maka solusi terbaik adalah …", a: "Eksploitasi maksimal", b: "Konservasi dan efisiensi", c: "Konsumsi meningkat", d: "Produksi besar", e: "Impor terus", correct: "b" },
            { q: "Ekonomi kreatif ditandai dengan …", a: "Mengandalkan SDA", b: "Berbasis ide dan inovasi", c: "Tenaga kerja rendah", d: "Teknologi rendah", e: "Produksi massal", correct: "b" },
            { q: "Jika UMKM berkembang pesat, maka dampaknya adalah …", a: "Pengangguran meningkat", b: "Ekonomi lokal tumbuh", c: "Ketimpangan meningkat", d: "Impor meningkat", e: "Produksi turun", correct: "b" },
            { q: "Digitalisasi ekonomi berdampak pada …", a: "Transaksi lebih lambat", b: "Akses pasar terbatas", c: "Efisiensi meningkat", d: "Biaya tinggi", e: "Produksi menurun", correct: "c" },
            { q: "Jika suatu negara mengembangkan energi terbarukan, maka dampaknya adalah …", a: "Emisi meningkat", b: "Lingkungan lebih terjaga", c: "Ketergantungan fosil meningkat", d: "Biaya energi naik", e: "Produksi turun", correct: "b" },
            { q: "Salah satu tantangan pembangunan berkelanjutan adalah …", a: "Ketersediaan teknologi", b: "Konflik kepentingan ekonomi dan lingkungan", c: "Sumber daya melimpah", d: "Penduduk sedikit", e: "Teknologi maju", correct: "b" },
            { q: "Jika terjadi overfishing, maka dampaknya adalah …", a: "Produksi ikan meningkat", b: "Ekosistem laut terganggu", c: "Biodiversitas meningkat", d: "Nelayan sejahtera", e: "Laut stabil", correct: "b" },
            { q: "Penggunaan teknologi ramah lingkungan bertujuan untuk …", a: "Meningkatkan polusi", b: "Menjaga keberlanjutan", c: "Mengurangi produksi", d: "Meningkatkan biaya", e: "Mengurangi efisiensi", correct: "b" },
            { q: "Jika suatu kota menerapkan transportasi publik massal, maka dampaknya adalah …", a: "Kemacetan meningkat", b: "Polusi meningkat", c: "Emisi berkurang", d: "Konsumsi BBM naik", e: "Waktu tempuh meningkat", correct: "c" },
            { q: "Indikator keberhasilan pembangunan berkelanjutan adalah …", a: "GDP tinggi saja", b: "Keseimbangan ekonomi, sosial, dan lingkungan", c: "Produksi tinggi", d: "Konsumsi tinggi", e: "Ekspor tinggi", correct: "b" }
        ];

        let currentQuestion = 0;
        let userAnswers = new Array(rawQuestions.length).fill(null);
        let timeLeft = 7200; // 2 jam

        // Inisialisasi
        function init() {
            renderNav();
            loadQuestion();
            startTimer();
        }

        function renderNav() {
            const grid = document.getElementById('nav-grid');
            grid.innerHTML = '';
            rawQuestions.forEach((_, index) => {
                const btn = document.createElement('div');
                btn.innerText = index + 1;
                btn.className = `question-nav-btn ${userAnswers[index] ? 'nav-answered' : 'nav-unanswered'}`;
                if(index === currentQuestion) btn.classList.add('nav-current');
                btn.onclick = () => jumpToQuestion(index);
                grid.appendChild(btn);
            });
        }

        function loadQuestion() {
            const q = rawQuestions[currentQuestion];
            document.getElementById('question-number').innerText = `Soal No. ${currentQuestion + 1}`;
            document.getElementById('question-text').innerText = q.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            ['a', 'b', 'c', 'd', 'e'].forEach(opt => {
                if(q[opt]) {
                    const button = document.createElement('button');
                    button.className = `w-full text-left p-4 rounded-xl border-2 transition ${userAnswers[currentQuestion] === opt ? 'border-blue-600 bg-blue-50' : 'border-gray-100 hover:border-blue-200'}`;
                    button.innerHTML = `<span class="font-bold mr-2 uppercase">${opt}.</span> ${q[opt]}`;
                    button.onclick = () => selectOption(opt);
                    container.appendChild(button);
                }
            });
            renderNav();
        }

        function selectOption(opt) {
            userAnswers[currentQuestion] = opt;
            loadQuestion();
        }

        function nextQuestion() {
            if(currentQuestion < rawQuestions.length - 1) {
                currentQuestion++;
                loadQuestion();
            }
        }

        function prevQuestion() {
            if(currentQuestion > 0) {
                currentQuestion--;
                loadQuestion();
            }
        }

        function jumpToQuestion(index) {
            currentQuestion = index;
            loadQuestion();
        }

        function startTimer() {
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                if(timeLeft <= 0) {
                    clearInterval(interval);
                    finishExam();
                    return;
                }
                timeLeft--;
                const h = Math.floor(timeLeft / 3600);
                const m = Math.floor((timeLeft % 3600) / 60);
                const s = timeLeft % 60;
                timerEl.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        function finishExam() {
            let correct = 0;
            let wrong = 0;
            let unanswered = 0;

            userAnswers.forEach((ans, idx) => {
                if(ans === null) unanswered++;
                else if(ans === rawQuestions[idx].correct) correct++;
                else wrong++;
            });

            const score = (correct * 4) - (wrong * 1);
            
            document.getElementById('res-correct').innerText = correct;
            document.getElementById('res-wrong').innerText = wrong;
            document.getElementById('res-score').innerText = `Skor: ${score}`;
            document.getElementById('result-modal').style.display = 'flex';
        }

        window.onload = init;
    </script>
</body>
</html>
